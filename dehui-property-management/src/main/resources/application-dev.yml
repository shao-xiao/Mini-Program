spring:
  application:
    name: dehui-property-management

  datasource:
    url: jdbc:h2:file:./data/property_dev;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

#  profiles:
#    active: dev

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.dehui.property: DEBUG
    org.springframework: INFO
