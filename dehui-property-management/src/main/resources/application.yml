spring:
  application:
    name: dehui-property-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: ${DEHUI_UPLOAD_MAX_FILE_SIZE:20MB}
      max-request-size: ${DEHUI_UPLOAD_MAX_REQUEST_SIZE:50MB}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true

dehui:
  security:
    token-ttl-hours: ${DEHUI_TOKEN_TTL_HOURS:12}
  file:
    upload-dir: ${DEHUI_UPLOAD_DIR:uploads}

logging:
  level:
    com.dehui.property: INFO
